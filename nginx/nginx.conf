# HTTP server — redirect to HTTPS + serve Let's Encrypt webroot challenge
server {
    listen 80;
    server_name _;

    # Let's Encrypt webroot challenge (certbot writes here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — TLS termination + proxy to NestJS API
server {
    listen 443 ssl;
    server_name _;

    # TLS certificates (provisioned by certbot, mounted from letsencrypt_data volume)
    ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # CV attachments can be several MB (PDF base64 encoded in JSON)
    client_max_body_size 10m;

    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;

        # Pass real client IP to NestJS (important for ThrottlerGuard per-IP limits)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # WebSocket upgrade support (future-proofing)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
